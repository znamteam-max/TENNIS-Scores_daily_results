name = "tennis-daily-results"
main = "src/index.js"
compatibility_date = "2026-05-07"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[triggers]
crons = ["*/15 * * * *"]

[vars]
APP_TZ = "Europe/Helsinki"
SUMMARY_ENABLED = "1"
SUMMARY_ODDS_SOURCE = "flashscore"
FLASHSCORE_ODDS_ENABLED = "1"
FLASHSCORE_ODDS_REFRESH_MINUTES = "30"
FLASHSCORE_ODDS_FETCH_LIMIT = "8"
ODDS_API_REGIONS = "eu"
ODDS_API_MARKETS = "h2h"
ODDS_REFRESH_MINUTES = "30"
SUMMARY_REQUIRE_ODDS = "1"
SUMMARY_PICKEM_MARGIN = "0.08"
SUMMARY_UPSET_MIN_ODDS = "2.70"
